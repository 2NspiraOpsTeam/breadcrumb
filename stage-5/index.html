<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breadcrumb | OSINT Challenge</title>
  <meta name="version" content="2026-07-01T13:25:00Z">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070b;
      --panel: rgba(8, 11, 12, 0.92);
      --panel-soft: rgba(255, 255, 255, 0.03);
      --line: rgba(178, 255, 225, 0.08);
      --text: #f4f7f5;
      --muted: rgba(192, 255, 232, 0.48);
      --hint: rgba(234, 245, 240, 0.82);
      --accent: #9bf3cf;
      --success: #b7ffd8;
      --success-bg: rgba(122, 245, 189, 0.1);
      --danger-bg: rgba(208, 124, 124, 0.12);
      --danger: #ffcdcd;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(155, 243, 207, 0.05), transparent 26%),
        radial-gradient(circle at bottom, rgba(110, 255, 214, 0.04), transparent 28%),
        linear-gradient(180deg, #020304 0%, #06090a 100%);
      color: var(--text);
    }

    body {
      font-family: "IBM Plex Mono", monospace;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      background: none;
      color: inherit;
    }

    .app-shell {
      min-height: 100vh;
      padding: 28px;
      display: grid;
      place-items: center;
    }

    .fade-layer {
      width: min(1100px, 100%);
      transition: opacity 320ms ease, transform 320ms ease;
    }

    .fade-layer.is-transitioning {
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
    }

    .landing {
      min-height: calc(100vh - 56px);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 6vw 4vw;
      position: relative;
    }

    .landing-card {
      width: min(760px, 100%);
      display: grid;
      gap: 34px;
      justify-items: center;
    }

    .landing-mark {
      font-size: 0.72rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .system-status {
      position: absolute;
      top: 0;
      left: 0;
      font-size: 0.73rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
    }

    .landing-statement {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.25rem, 5.4vw, 4.65rem);
      line-height: 1.1;
      letter-spacing: 0.01em;
      max-width: 12ch;
      color: var(--text);
      text-wrap: balance;
    }

    .landing-cta {
      padding: 16px 22px;
      border: 0;
      color: var(--text);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: transform 160ms ease, color 160ms ease, opacity 160ms ease;
    }

    .landing-cta:hover,
    .landing-cta:focus-visible {
      transform: translateY(-2px);
      color: var(--accent);
      opacity: 1;
      outline: none;
    }

    .stage-shell {
      min-height: calc(100vh - 56px);
      display: grid;
      align-items: start;
      padding: clamp(12px, 2vw, 28px) 0;
    }

    .stage-frame {
      width: min(880px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 26px;
    }

    .stage-tracker {
      font-size: 0.76rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stage-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stage-toolbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stage-body {
      min-height: 76vh;
      border: 1px solid rgba(155, 243, 207, 0.06);
      background: linear-gradient(180deg, rgba(4, 7, 8, 0.92), rgba(3, 5, 6, 0.96));
      box-shadow: var(--shadow);
      padding: clamp(22px, 3vw, 42px);
      display: grid;
      gap: 24px;
      align-content: start;
      position: relative;
    }

    .stage-body-trojan {
      min-height: 82vh;
      border: 0;
      background: transparent;
      box-shadow: none;
      padding: 0;
      gap: 14px;
      overflow: hidden;
    }

    .asset-container {
      min-height: clamp(230px, 34vw, 420px);
      border: 1px solid rgba(155, 243, 207, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.005)),
        radial-gradient(circle at 50% 30%, rgba(155, 243, 207, 0.08), transparent 34%),
        #07090a;
      display: grid;
      place-items: center;
      padding: 22px;
      overflow: hidden;
      position: relative;
    }

    .asset-container img,
    .asset-container svg {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      filter: saturate(0.74) contrast(1.02) brightness(0.9);
    }

    .asset-container-trojan {
      min-height: 74vh;
      border: 0;
      background: #050607;
      padding: 0;
      place-items: stretch;
    }

    .asset-container-trojan img {
      width: 100%;
      height: 100%;
      max-width: none;
      max-height: none;
      object-fit: cover;
      filter: saturate(0.86) contrast(1.08) brightness(0.84);
      transform: scale(1.28);
      transform-origin: center 42%;
    }

    .stage-brief-overlay {
      position: absolute;
      top: clamp(20px, 2.8vw, 34px);
      left: clamp(20px, 2.8vw, 34px);
      width: min(430px, calc(100% - 56px));
      padding: 18px 20px;
      background: linear-gradient(180deg, rgba(3, 5, 6, 0.86), rgba(3, 5, 6, 0.58));
      border: 0;
      backdrop-filter: blur(5px);
      z-index: 2;
    }

    .stage-brief-overlay .prompt-title {
      font-size: clamp(1.62rem, 2.7vw, 2.1rem);
      margin-bottom: 10px;
    }

    .stage-brief-overlay .prompt-copy {
      max-width: none;
      color: rgba(244, 241, 234, 0.92);
      font-size: 0.92rem;
      line-height: 1.72;
    }

    .stage-body-trojan .hint-rail,
    .stage-body-trojan .feedback-line,
    .stage-body-trojan .input-frame {
      position: static;
      left: auto;
      right: auto;
      bottom: auto;
      margin-left: clamp(20px, 2.8vw, 34px);
      margin-right: clamp(20px, 2.8vw, 34px);
    }

    .stage-body-trojan .hint-rail {
      min-height: 0;
      margin-top: 0;
      align-items: start;
    }

    .stage-body-trojan .feedback-line {
      min-height: 18px;
    }

    .stage-body-trojan .input-frame {
      margin-top: 4px;
      margin-bottom: clamp(18px, 2.8vw, 28px);
      padding-top: 18px;
      background: linear-gradient(180deg, rgba(4, 7, 8, 0.94), rgba(3, 5, 6, 0.98));
    }

    .asset-meta {
      position: absolute;
      left: 18px;
      bottom: 16px;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .asset-container-trojan .asset-meta {
      left: clamp(20px, 2.8vw, 34px);
      bottom: clamp(108px, 12vw, 126px);
      color: rgba(244, 241, 234, 0.58);
      z-index: 2;
    }

    .evidence-card {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      gap: 16px;
    }

    .evidence-symbol {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(3rem, 10vw, 7rem);
      color: rgba(211, 183, 143, 0.86);
      line-height: 0.9;
    }

    .evidence-caption {
      color: var(--hint);
      font-size: 0.86rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      max-width: 38ch;
      line-height: 1.8;
    }

    .timeline-graphic {
      width: min(100%, 680px);
      height: auto;
      justify-self: center;
      border: 1px solid rgba(155, 243, 207, 0.08);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.24);
    }

    .prompt-block {
      display: grid;
      gap: 14px;
      padding: 0 0 86px;
    }

    .prompt-title {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.9rem, 4vw, 2.6rem);
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .prompt-copy {
      color: var(--hint);
      font-size: 0.98rem;
      line-height: 1.95;
      max-width: 62ch;
    }

    .prompt-copy p + p {
      margin-top: 14px;
    }

    .external-link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 10px;
    }

    .external-link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border: 1px solid rgba(155, 243, 207, 0.28);
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.74rem;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .external-link-button:hover,
    .external-link-button:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(155, 243, 207, 0.72);
      background: rgba(155, 243, 207, 0.08);
      outline: none;
    }

    .external-link-note {
      color: var(--muted);
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hint-rail {
      position: absolute;
      left: clamp(22px, 3vw, 42px);
      right: clamp(22px, 3vw, 42px);
      bottom: 92px;
      min-height: 72px;
      display: grid;
      align-items: end;
      pointer-events: none;
    }

    .hint-card {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 320ms ease, transform 320ms ease;
      border-top: 1px solid rgba(155, 243, 207, 0.18);
      padding-top: 14px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.8;
      max-width: 66ch;
    }

    .hint-card.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hint-card strong {
      color: var(--accent);
      font-weight: 500;
    }

    .feedback-line {
      position: absolute;
      left: clamp(22px, 3vw, 42px);
      right: clamp(22px, 3vw, 42px);
      bottom: 58px;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      min-height: 18px;
      transition: color 200ms ease, opacity 200ms ease;
      opacity: 0;
    }

    .feedback-line.is-visible {
      opacity: 1;
    }

    .feedback-line.success {
      color: var(--success);
    }

    .feedback-line.error {
      color: var(--danger);
    }

    .input-frame {
      position: absolute;
      left: clamp(22px, 3vw, 42px);
      right: clamp(22px, 3vw, 42px);
      bottom: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      cursor: text;
    }

    .stage-input {
      position: absolute;
      inset: 16px 0 0;
      width: 100%;
      opacity: 0;
      border: 0;
      background: transparent;
      color: transparent;
      padding: 0;
      outline: none;
      caret-color: transparent;
    }

    .token-box-row {
      display: flex;
      justify-content: center;
      gap: clamp(8px, 1.6vw, 14px);
      padding: 8px 0 4px;
    }

    .token-box {
      width: clamp(42px, 7vw, 56px);
      height: clamp(50px, 8vw, 62px);
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.02);
      color: rgba(244, 241, 234, 0.38);
      font-size: clamp(1rem, 2vw, 1.12rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 180ms ease, background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .token-box.is-filled {
      color: var(--text);
      border-color: rgba(155, 243, 207, 0.44);
      background: rgba(155, 243, 207, 0.07);
    }

    .token-box.is-active {
      border-color: rgba(155, 243, 207, 0.78);
      background: rgba(155, 243, 207, 0.12);
      color: var(--text);
      transform: translateY(-1px);
    }

    .token-box.is-success {
      border-color: rgba(155, 243, 207, 0.92);
      background: rgba(155, 243, 207, 0.16);
      color: var(--success);
    }

    @media (max-width: 520px) {
      .token-box-row {
        gap: 8px;
      }

      .token-box {
        width: min(15.5vw, 48px);
        height: min(17vw, 54px);
      }
    }

    .completion {
      min-height: calc(100vh - 56px);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 6vw 4vw;
    }

    .completion-card {
      width: min(720px, 100%);
      display: grid;
      gap: 22px;
    }

    .completion-card h2 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.3rem, 5vw, 4rem);
      font-weight: 600;
    }

    .completion-card p {
      color: var(--hint);
      line-height: 1.9;
      max-width: 58ch;
      margin: 0 auto;
    }

    .completion-card .cta-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ghost-button,
    .solid-button {
      padding: 14px 18px;
      border: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.78rem;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .solid-button {
      border-color: rgba(155, 243, 207, 0.32);
      background: rgba(155, 243, 207, 0.08);
    }

    .ghost-button:hover,
    .ghost-button:focus-visible,
    .solid-button:hover,
    .solid-button:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(155, 243, 207, 0.74);
      outline: none;
    }

    .stage-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .stage-actions .ghost-button,
    .stage-actions .solid-button {
      padding: 12px 16px;
      font-size: 0.72rem;
    }

    @media (max-width: 720px) {
      .app-shell {
        padding: 14px;
      }

      .stage-body {
        min-height: 82vh;
      }

      .landing-statement {
        max-width: 14ch;
      }
    }
  </style>
</head>

      function sanitizeInput(value) {
        return value.toUpperCase().replace(/\s+/g, "");
      }

      function getInputLabel(stage) {
        if (stage.id === 1) {
          return "Enter the five-slot sector token";
        }

        return `Enter the ${stage.expectedLength}-slot stage token`;
      }

      function renderTokenBoxes(length) {
        return `
          <div class="token-box-row" id="token-box-row" aria-hidden="true">
            ${Array.from({ length }, (_, index) => `<div class="token-box${index === 0 ? " is-active" : ""}" data-token-index="${index}">_</div>`).join("")}
          </div>
        `;
      }

      function syncTokenBoxes(value, isSuccess = false) {
        const boxes = document.querySelectorAll(".token-box");
        if (!boxes.length) {
          return;
        }

        boxes.forEach((box, index) => {
          const char = value[index] || "";
          box.textContent = char || "_";
          box.classList.toggle("is-filled", Boolean(char));
          box.classList.toggle("is-active", !isSuccess && index === Math.min(value.length, boxes.length - 1) && value.length < boxes.length);
          box.classList.toggle("is-success", isSuccess);
        });
      }

      function generateToken(length = 4) {
        const randomValues = new Uint32Array(length);
        window.crypto.getRandomValues(randomValues);
        return Array.from(randomValues, (value) => CHARSET[value % CHARSET.length]).join("");
      }

      function getUnlockedStage() {
        const stored = Number.parseInt(localStorage.getItem("current_stage") || "1", 10);
        if (Number.isNaN(stored)) {
          return 1;
        }

        return Math.min(Math.max(stored, 1), TOTAL_STAGES + 1);
      }

      function getAccessibleStage(requestedStage) {
        const unlockedStage = getUnlockedStage();
        return Math.min(Math.max(requestedStage, 1), Math.min(unlockedStage, TOTAL_STAGES));
      }

      function getResumeStage() {
        return getAccessibleStage(getUnlockedStage());
      }

      async function sha256(value) {
        const buffer = await window.crypto.subtle.digest(
          "SHA-256",
          new TextEncoder().encode(value)
        );
        return Array.from(new Uint8Array(buffer))
          .map((byte) => byte.toString(16).padStart(2, "0"))
          .join("");
      }

      function clearHintTimers() {
        state.hintTimers.forEach((timerId) => window.clearTimeout(timerId));
        state.hintTimers = [];
        if (state.feedbackTimer) {
          window.clearTimeout(state.feedbackTimer);
          state.feedbackTimer = null;
        }
      }

      function showHintMessage(title, text) {
        const hintCard = document.getElementById("hint-card");
        if (!hintCard) {
          return;
        }

        hintCard.innerHTML = `<strong>${title}</strong> ${text}`;
        hintCard.classList.add("is-visible");
      }

      function resetStageOneHints() {
        state.stageOneAttempts = 0;
        state.stageOneHintLevel = 0;
        const hintCard = document.getElementById("hint-card");
        if (!hintCard) {
          return;
        }
        hintCard.className = "hint-card";
        hintCard.innerHTML = "";
      }

      function updateStageOneHints() {
        const hintCard = document.getElementById("hint-card");
        if (!hintCard) {
          return;
        }

        if (state.stageOneAttempts >= 10 && state.stageOneHintLevel < 2) {
          hintCard.innerHTML = `<strong>[INTEL ALERT - RECON DIRECTIVE]</strong> The structural truth is hidden in plain sight outside the walls of the asset container. Scan the terminal navigation routing path. The unique five-slot operational DOMAIN token you require is pinned to the absolute trailing edge of your active browser parameter string.`;
          hintCard.classList.add("is-visible");
          state.stageOneHintLevel = 2;
          return;
        }

        if (state.stageOneAttempts >= 5 && state.stageOneHintLevel < 1) {
          hintCard.innerHTML = `<strong>[INTEL ALERT - DECEPTION DIAGNOSTIC]</strong> Do not get trapped by the facade of the visual payload. Disinformation operations mask their true origin under the guise of an offering. To bypass the trap, an agent must audit the structural parameters of the host network. Look at the boundary of your deployment frame.`;
          hintCard.classList.add("is-visible");
          state.stageOneHintLevel = 1;
        }
      }

      function renderTrojanAsset() {
        const stage = stageDefinitions.find((item) => item.id === 1);
        return `
          <div class="asset-container asset-container-trojan">
            <div class="stage-brief-overlay">
              <div class="prompt-title">${stage.title}</div>
              <div class="prompt-copy">
                ${stage.prompt.map((paragraph) => `<p>${paragraph}</p>`).join("")}
              </div>
            </div>
            <img
              src="/assets/trojan-horse-stage-1.jpg"
              alt="Giovanni Domenico Tiepolo, The Procession of the Trojan Horse into Troy"
              loading="eager"
              referrerpolicy="no-referrer"
            >
            <div class="asset-meta">Giovanni Domenico Tiepolo // The Procession of the Trojan Horse into Troy</div>
          </div>
        `;
      }

      function renderEvidenceAsset(stage) {
        const evidenceVisual = stage.assetGraphic
          ? `<img class="timeline-graphic" src="${stage.assetGraphic}" alt="${stage.assetAlt || stage.assetCaption}" loading="eager">`
          : `<div class="evidence-symbol">${stage.assetSymbol}</div>`;

        return `
          <div class="asset-container">
            <div class="evidence-card">
              ${evidenceVisual}
              <div class="evidence-caption">${stage.assetCaption}</div>
            </div>
            <div class="asset-meta">${stage.assetMeta}</div>
          </div>
        `;
      }

      function renderLanding() {
        clearHintTimers();
        const resumeStage = getResumeStage();
        const hasProgress = resumeStage > 1;

        app.innerHTML = `
          <section class="landing">
            <div class="system-status">BREADCRUMB SYSTEM STATUS: SECURE // OPERATOR ACCESS REQUIRED</div>
            <div class="landing-card">
              <div class="landing-mark">Breadcrumb</div>
              <div class="landing-statement">
                In a digital landscape crowded with noise, the truth is a breadcrumb hidden within a global haystack; your only weapon is objective verification.
              </div>
              <button class="landing-cta" id="accept-challenge" type="button">${hasProgress ? "[ Resume Breadcrumb Run ]" : "[ Initialize Breadcrumb Run ]"}</button>
              ${hasProgress ? `<button class="ghost-button" id="restart-from-beginning" type="button">Start From Beginning</button>` : ""}
              ${hasProgress ? `<div class="asset-meta">Saved checkpoint detected // Stage ${String(resumeStage).padStart(2, "0")} of ${TOTAL_STAGES}</div>` : ""}
            </div>
          </section>
        `;

        document.getElementById("accept-challenge").addEventListener("click", () => {
          navigateToStage(getResumeStage(), true);
        });
        const restartButton = document.getElementById("restart-from-beginning");
        if (restartButton) {
          restartButton.addEventListener("click", () => {
            restartRun(true);
          });
        }
      }

      function renderStage(stageNumber) {
        clearHintTimers();
        const stage = stageDefinitions.find((item) => item.id === stageNumber);
        if (!stage) {
          navigateHome(true);
          return;
        }
        const inputLabel = getInputLabel(stage);

        const assetMarkup = stage.assetType === "trojan"
          ? renderTrojanAsset()
          : renderEvidenceAsset(stage);

        const promptMarkup = stage.assetType === "trojan"
          ? ""
          : `
                <div class="prompt-block">
                  <div class="prompt-title">${stage.title}</div>
                  <div class="prompt-copy">
                    ${stage.prompt.map((paragraph) => `<p>${paragraph}</p>`).join("")}
                    ${stage.externalLinkUrl ? `
                      <div class="external-link-row">
                        <a class="external-link-button" href="${stage.externalLinkUrl}" target="_blank" rel="noopener noreferrer">${stage.externalLinkLabel || "Open External Source"}</a>
                        <div class="external-link-note">Wayback Machine // secure external tab</div>
                      </div>
                    ` : ""}
                  </div>
                </div>
              `;

        const stageBodyClass = stage.assetType === "trojan"
          ? "stage-body stage-body-trojan"
          : "stage-body";

        app.innerHTML = `
          <section class="stage-shell">
            <div class="stage-frame">
                <div class="stage-toolbar">
                  <div class="stage-tracker">${stage.tracker}</div>
                  <div class="stage-toolbar-actions">
                    <button class="solid-button" id="restart-from-beginning-toolbar" type="button">Start From Beginning</button>
                  </div>
                </div>
              <div class="${stageBodyClass}">
                ${assetMarkup}
                ${promptMarkup}
                <div class="hint-rail">
                  <div class="hint-card" id="hint-card"></div>
                </div>
                <div class="feedback-line" id="feedback-line"></div>
                <div class="input-frame">
                  ${renderTokenBoxes(stage.expectedLength)}
                  <input
                    id="stage-input"
                    class="stage-input"
                    type="text"
                    spellcheck="false"
                    autocomplete="off"
                    autocapitalize="characters"
                    maxlength="${stage.expectedLength}"
                    aria-label="${inputLabel}"
                  >
                </div>
              </div>
            </div>
          </section>
        `;

        const input = document.getElementById("stage-input");
        const inputFrame = document.querySelector(".input-frame");
        syncTokenBoxes("");
        input.focus();
        input.addEventListener("input", handleStageInput);
        inputFrame.addEventListener("click", () => input.focus());
        document.getElementById("restart-from-beginning-toolbar").addEventListener("click", () => {
          restartRun(true);
        });

        if (stage.id === 1) {
          mountStageOneToken();
        } else {
          state.activeStageHash = stage.hash;
        }

        if (Array.isArray(stage.timedHints)) {
          stage.timedHints.forEach((hint) => {
            const timerId = window.setTimeout(() => {
              showHintMessage(hint.title, hint.text);
            }, hint.delayMs);
            state.hintTimers.push(timerId);
          });
        }
      }

      function renderCompletion() {
        clearHintTimers();
        app.innerHTML = `
          <section class="completion">
            <div class="completion-card">
              <div class="landing-mark">Breadcrumb Complete</div>
              <h2>Verification survived the noise.</h2>
              <p>
                You completed the full investigation path and held the signal long enough to turn fragments into structure. The trail remains open whenever you want to run it again.
              </p>
              <div class="cta-row">
                <button class="solid-button" id="restart-run" type="button">Run Breadcrumb Again</button>
                <button class="ghost-button" id="return-home" type="button">Return to Entry Point</button>
              </div>
            </div>
          </section>
        `;

        document.getElementById("restart-run").addEventListener("click", () => {
          restartRun(true);
        });
        document.getElementById("return-home").addEventListener("click", () => {
          navigateHome(true);
        });
      }

      function showFeedback(type, message) {
        const feedback = document.getElementById("feedback-line");
        if (!feedback) {
          return;
        }

        feedback.className = `feedback-line is-visible ${type}`;
        feedback.textContent = message;

        if (type === "error") {
          if (state.feedbackTimer) {
            window.clearTimeout(state.feedbackTimer);
          }
          state.feedbackTimer = window.setTimeout(() => {
            feedback.className = "feedback-line";
            feedback.textContent = "";
          }, 1200);
        }
      }

      async function handleStageInput(event) {
        const input = event.target;
        const stage = stageDefinitions.find((item) => item.id === state.currentStage);
        if (!stage) {
          return;
        }

        const sanitized = sanitizeInput(input.value).slice(0, stage.expectedLength);
        if (input.value !== sanitized) {
          input.value = sanitized;
        }
        syncTokenBoxes(sanitized);

        if (!sanitized) {
          return;
        }

        if (sanitized.length < stage.expectedLength) {
          return;
        }

        const userHash = await sha256(sanitized);
        if (userHash !== state.activeStageHash) {
          if (stage.id === 1) {
            state.stageOneAttempts += 1;
            updateStageOneHints();
          }
          input.value = "";
          syncTokenBoxes("");
          showFeedback("error", "Token mismatch");
          return;
        }

        syncTokenBoxes(sanitized, true);
        showFeedback("success", "Token verified");
        input.disabled = true;
        const nextStage = state.currentStage + 1;
        localStorage.setItem("current_stage", String(nextStage));

        window.setTimeout(() => {
          if (nextStage > TOTAL_STAGES) {
            navigateToCompletion(true);
            return;
          }
          navigateToStage(nextStage, true);
        }, 520);
      }

      async function mountStageOneToken() {
        resetStageOneHints();
        const token = generateToken(5);
        state.activeStageHash = await sha256(token);
        const nextUrl = new URL(window.location.href);
        nextUrl.pathname = "/stage-1";
        nextUrl.searchParams.set("sector", token);
        window.history.replaceState({ view: "stage", stage: 1 }, "", nextUrl);
      }

      function restartRun(animate = false) {
        localStorage.setItem("current_stage", "1");
        resetStageOneHints();
        const execute = () => {
          state.currentView = "stage";
          state.currentStage = 1;
          window.history.pushState({ view: "stage", stage: 1 }, "", "/stage-1");
          renderStage(1);
        };

        if (animate) {
          withTransition(execute);
        } else {
          execute();
        }
      }

      function withTransition(callback) {
        if (state.transitionLock) {
          return;
        }
        state.transitionLock = true;
        clearHintTimers();
        app.classList.add("is-transitioning");

        window.setTimeout(() => {
          callback();
          requestAnimationFrame(() => {
            app.classList.remove("is-transitioning");
            state.transitionLock = false;
          });
        }, 220);
      }

      function navigateHome(animate = false) {
        const execute = () => {
          state.currentView = "landing";
          state.currentStage = 1;
          window.history.pushState({ view: "landing" }, "", "/");
          renderLanding();
        };

        if (animate) {
          withTransition(execute);
        } else {
          execute();
        }
      }

      function navigateToStage(stageNumber, animate = false, preserveUrl = false) {
        const execute = () => {
          const accessibleStage = getAccessibleStage(stageNumber);
          state.currentView = "stage";
          state.currentStage = accessibleStage;
          if (!preserveUrl) {
            const nextUrl = accessibleStage === 1 ? "/stage-1" : `${ROUTE_STAGE_PREFIX}${accessibleStage}`;
            window.history.pushState({ view: "stage", stage: accessibleStage }, "", nextUrl);
          }
          renderStage(accessibleStage);
        };

        if (animate) {
          withTransition(execute);
        } else {
          execute();
        }
      }

      function navigateToCompletion(animate = false) {
        const execute = () => {
          state.currentView = "complete";
          window.history.pushState({ view: "complete" }, "", "/complete");
          renderCompletion();
        };

        if (animate) {
          withTransition(execute);
        } else {
          execute();
        }
      }

      function resolveRoute() {
        const pathname = window.location.pathname;
        const completion = pathname === "/complete";
        if (completion) {
          if (getUnlockedStage() <= TOTAL_STAGES) {
            navigateToStage(getAccessibleStage(TOTAL_STAGES), false);
            return;
          }
          renderCompletion();
          return;
        }

        const stageMatch = pathname.match(/^\/stage-(\d+)$/);
        if (stageMatch) {
          const stageNumber = Number.parseInt(stageMatch[1], 10);
          const accessibleStage = getAccessibleStage(stageNumber);
          if (accessibleStage !== stageNumber) {
            navigateToStage(accessibleStage, false);
            return;
          }
          state.currentView = "stage";
          state.currentStage = accessibleStage;
          renderStage(state.currentStage);
          return;
        }

        renderLanding();
      }

      window.addEventListener("popstate", () => {
        clearHintTimers();
        resolveRoute();
      });

      resolveRoute();
    })();
  </script>
