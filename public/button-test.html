<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Wayback Button Test</title>
<style>
  body{font-family:Arial,sans-serif;margin:2rem;background:#05070b;color:#f4f7f5;}
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:.75rem 1.5rem;
    border:1px solid #9bf3cf;
    color:#f4f7f5;
    background:#9bf3cf;
    text-decoration:none;
    font-weight:bold;
  }
</style>
</head>
<body>
<h2>Test Wayback Button</h2>
<a class="btn" href="https://web.archive.org/web/*/granma.cu" target="_blank">Open Wayback Timeline</a>
<p style="margin-top:1rem;color:#888;">Click the button to open the Wayback Machine for granma.cu.</p>
</body>
</html>
