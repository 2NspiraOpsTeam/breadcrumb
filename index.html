<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breadcrumb | OSINT Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070b;
      --panel: rgba(8, 11, 12, 0.92);
      --panel-soft: rgba(255, 255, 255, 0.03);
      --line: rgba(178, 255, 225, 0.08);
      --text: #f4f7f5;
      --muted: rgba(192, 255, 232, 0.48);
      --hint: rgba(234, 245, 240, 0.82);
      --accent: #9bf3cf;
      --success: #b7ffd8;
      --success-bg: rgba(122, 245, 189, 0.1);
      --danger-bg: rgba(208, 124, 124, 0.12);
      --danger: #ffcdcd;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(155, 243, 207, 0.05), transparent 26%),
        radial-gradient(circle at bottom, rgba(110, 255, 214, 0.04), transparent 28%),
        linear-gradient(180deg, #020304 0%, #06090a 100%);
      color: var(--text);
    }

    body {
      font-family: "IBM Plex Mono", monospace;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      background: none;
      color: inherit;
    }

    .app-shell {
      min-height: 100vh;
      padding: 28px;
      display: grid;
      place-items: center;
    }

    .fade-layer {
      width: min(1100px, 100%);
      transition: opacity 320ms ease, transform 320ms ease;
    }

    .fade-layer.is-transitioning {
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
    }

    .landing {
      min-height: calc(100vh - 56px);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 6vw 4vw;
      position: relative;
    }

    .landing-card {
      width: min(760px, 100%);
      display: grid;
      gap: 34px;
      justify-items: center;
    }

    .landing-mark {
      font-size: 0.72rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .system-status {
      position: absolute;
      top: 0;
      left: 0;
      font-size: 0.73rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
    }

    .landing-statement {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.25rem, 5.4vw, 4.65rem);
      line-height: 1.1;
      letter-spacing: 0.01em;
      max-width: 12ch;
      color: var(--text);
      text-wrap: balance;
    }

    .landing-cta {
      padding: 16px 22px;
      border: 0;
      color: var(--text);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: transform 160ms ease, color 160ms ease, opacity 160ms ease;
    }

    .landing-cta:hover,
    .landing-cta:focus-visible {
      transform: translateY(-2px);
      color: var(--accent);
      opacity: 1;
      outline: none;
    }

    .stage-shell {
      min-height: calc(100vh - 56px);
      display: grid;
      align-items: start;
      padding: clamp(12px, 2vw, 28px) 0;
    }

    .stage-frame {
      width: min(880px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 26px;
    }

    .stage-tracker {
      font-size: 0.76rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stage-body {
      min-height: 76vh;
      border: 1px solid rgba(155, 243, 207, 0.06);
      background: linear-gradient(180deg, rgba(4, 7, 8, 0.92), rgba(3, 5, 6, 0.96));
      box-shadow: var(--shadow);
      padding: clamp(22px, 3vw, 42px);
      display: grid;
      gap: 24px;
      align-content: start;
      position: relative;
    }

    .asset-container {
      min-height: clamp(230px, 34vw, 420px);
      border: 1px solid rgba(155, 243, 207, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.005)),
        radial-gradient(circle at 50% 30%, rgba(155, 243, 207, 0.08), transparent 34%),
        #07090a;
      display: grid;
      place-items: center;
      padding: 22px;
      overflow: hidden;
      position: relative;
    }

    .asset-container img,
    .asset-container svg {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      filter: saturate(0.74) contrast(1.02) brightness(0.9);
    }

    .asset-meta {
      position: absolute;
      left: 18px;
      bottom: 16px;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .evidence-card {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      gap: 16px;
    }

    .evidence-symbol {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(3rem, 10vw, 7rem);
      color: rgba(211, 183, 143, 0.86);
      line-height: 0.9;
    }

    .evidence-caption {
      color: var(--hint);
      font-size: 0.86rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      max-width: 38ch;
      line-height: 1.8;
    }

    .prompt-block {
      display: grid;
      gap: 14px;
      padding: 0 0 86px;
    }

    .prompt-title {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.9rem, 4vw, 2.6rem);
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .prompt-copy {
      color: var(--hint);
      font-size: 0.98rem;
      line-height: 1.95;
      max-width: 62ch;
    }

    .prompt-copy p + p {
      margin-top: 14px;
    }

    .hint-rail {
      position: absolute;
      left: clamp(22px, 3vw, 42px);
      right: clamp(22px, 3vw, 42px);
      bottom: 92px;
      min-height: 72px;
      display: grid;
      align-items: end;
      pointer-events: none;
    }

    .hint-card {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 320ms ease, transform 320ms ease;
      border-top: 1px solid rgba(155, 243, 207, 0.18);
      padding-top: 14px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.8;
      max-width: 66ch;
    }

    .hint-card.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hint-card strong {
      color: var(--accent);
      font-weight: 500;
    }

    .feedback-line {
      position: absolute;
      left: clamp(22px, 3vw, 42px);
      right: clamp(22px, 3vw, 42px);
      bottom: 58px;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      min-height: 18px;
      transition: color 200ms ease, opacity 200ms ease;
      opacity: 0;
    }

    .feedback-line.is-visible {
      opacity: 1;
    }

    .feedback-line.success {
      color: var(--success);
    }

    .feedback-line.error {
      color: var(--danger);
    }

    .input-frame {
      position: absolute;
      left: clamp(22px, 3vw, 42px);
      right: clamp(22px, 3vw, 42px);
      bottom: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .stage-input {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.22);
      background: transparent;
      color: var(--text);
      padding: 14px 0 12px;
      font-size: clamp(0.98rem, 2vw, 1.08rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      outline: none;
      caret-color: var(--accent);
    }

    .stage-input::placeholder {
      color: rgba(244, 241, 234, 0.26);
      text-transform: none;
      letter-spacing: 0.02em;
    }

    .completion {
      min-height: calc(100vh - 56px);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 6vw 4vw;
    }

    .completion-card {
      width: min(720px, 100%);
      display: grid;
      gap: 22px;
    }

    .completion-card h2 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.3rem, 5vw, 4rem);
      font-weight: 600;
    }

    .completion-card p {
      color: var(--hint);
      line-height: 1.9;
      max-width: 58ch;
      margin: 0 auto;
    }

    .completion-card .cta-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ghost-button,
    .solid-button {
      padding: 14px 18px;
      border: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.78rem;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .solid-button {
      border-color: rgba(155, 243, 207, 0.32);
      background: rgba(155, 243, 207, 0.08);
    }

    .ghost-button:hover,
    .ghost-button:focus-visible,
    .solid-button:hover,
    .solid-button:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(155, 243, 207, 0.74);
      outline: none;
    }

    @media (max-width: 720px) {
      .app-shell {
        padding: 14px;
      }

      .stage-body {
        min-height: 82vh;
      }

      .landing-statement {
        max-width: 14ch;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="fade-layer" id="app"></div>
  </div>

  <script>
    (() => {
      const TOTAL_STAGES = 10;
      const INPUT_PLACEHOLDER = "[Await Breadcrumb Input...]";
      const CHARSET = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      const ROUTE_STAGE_PREFIX = "/stage-";
      const state = {
        currentView: "landing",
        currentStage: 1,
        activeStageHash: "",
        hintTimers: [],
        feedbackTimer: null,
        transitionLock: false
      };

      const app = document.getElementById("app");

      const stageDefinitions = [
        {
          id: 1,
          tracker: "BREADCRUMB TRACK: 01 / 10 // OPERATIONAL ANCHOR: TROJAN STRATAGEM",
          title: "The Boundary Test",
          expectedLength: 4,
          assetType: "trojan",
          assetMeta: "Stage 1 visual clue",
          prompt: [
            "An old deception crossed a city gate because everyone studied the spectacle and ignored the path.",
            "You are not here to solve the horse. You are here to verify the boundary that carried it into this stage.",
            "Return the four-character sector token exactly as it appears at the edge of your window."
          ]
        },
        {
          id: 2,
          tracker: "BREADCRUMB TRACK: 02 / 10 // OPERATIONAL ANCHOR: SYNTHETIC PERSONAS",
          title: "Synthetic Personas",
          expectedLength: 2,
          hash: "11fb682be0a0233d5fb899721ecfc1827d20f0d2ff2e093310efa61efca8af1c",
          assetType: "text",
          assetMeta: "Profile set anomaly",
          assetSymbol: "AI",
          assetCaption: "Inspect the repeated features. The faces tell you the method before the account network tells you the motive.",
          prompt: [
            "You located a Stanford report describing a disinformation operation around bloqueo.",
            "Review the fake profile images tied to the campaign and identify the repeated pattern behind the portraits."
          ]
        },
        {
          id: 3,
          tracker: "BREADCRUMB TRACK: 03 / 10 // OPERATIONAL ANCHOR: AUDIENCE MAPPING",
          title: "Audience Mapping",
          expectedLength: 5,
          hash: "90008a2bee7e9adbf273a4c637683197878bed1e48a8b8c59ef4e9d95d0069eb",
          assetType: "text",
          assetMeta: "Target cohort",
          assetSymbol: "Y",
          assetCaption: "Find the segment that is digitally reachable, culturally adjacent, and historically easiest to influence.",
          prompt: [
            "The report names a network called DeZurdaTeam.",
            "Identify the primary audience segment this network was trying to influence inside the Cuban-American information ecosystem."
          ]
        },
        {
          id: 4,
          tracker: "BREADCRUMB TRACK: 04 / 10 // OPERATIONAL ANCHOR: NARRATIVE PRESSURE",
          title: "Narrative Pressure Point",
          expectedLength: 10,
          hash: "0834649cf2634dde335a5e7ffff5d8907934fe6721f9795e18a253e97fd12c74",
          assetType: "text",
          assetMeta: "Recurring claim",
          assetSymbol: "H",
          assetCaption: "A persuasive narrative often begins with a socially admired institution and removes its costs from view.",
          prompt: [
            "You now know the campaign targeted younger, digitally native Cuban-Americans in South Florida.",
            "Locate the recurring misconception used to soften critical scrutiny of the regime."
          ]
        },
        {
          id: 5,
          tracker: "BREADCRUMB TRACK: 05 / 10 // OPERATIONAL ANCHOR: DEFECTION SIGNAL",
          title: "Defection Signal",
          expectedLength: 8,
          hash: "26a39a83482f48feae455f6f37d87c7812fd3d0242ae711bdc30d7a749662546",
          assetType: "text",
          assetMeta: "Scale estimate",
          assetSymbol: "1K",
          assetCaption: "The story you need is quantitative, not rhetorical. Search for the rounded scale in the reporting.",
          prompt: [
            "The campaign praises Cuban healthcare while erasing physician defections and material scarcity.",
            "Estimate the scale used in public reporting for Cuban doctors defecting to the United States."
          ]
        },
        {
          id: 6,
          tracker: "BREADCRUMB TRACK: 06 / 10 // OPERATIONAL ANCHOR: INFORMAL PAYMENTS",
          title: "Informal Payments",
          expectedLength: 6,
          hash: "75e74817bfd082c9c1ff399396217f2d718ab5b688c7e8a0feb116a19b970515",
          assetType: "text",
          assetMeta: "Underground term",
          assetSymbol: "S",
          assetCaption: "Official systems rarely describe their own side channels. Local language usually does.",
          prompt: [
            "Propaganda hides the reality of families paying under the table for access to treatment.",
            "Identify the term commonly used for this practice."
          ]
        },
        {
          id: 7,
          tracker: "BREADCRUMB TRACK: 07 / 10 // OPERATIONAL ANCHOR: CONNECTIVITY CONSTRAINT",
          title: "Connectivity Constraint",
          expectedLength: 3,
          hash: "b5f6dbae04bd764b0c2f3cb796e404ffdf77fb4cac171d72ec7fa6a2077da252",
          assetType: "text",
          assetMeta: "Access rate",
          assetSymbol: "15%",
          assetCaption: "Find the recent estimate that defines how much of the network can see beyond national boundaries.",
          prompt: [
            "Trace how information control shapes what can be challenged publicly inside Cuba.",
            "Find a recent estimate for the share of Cubans who can access international websites."
          ]
        },
        {
          id: 8,
          tracker: "BREADCRUMB TRACK: 08 / 10 // OPERATIONAL ANCHOR: BROADCAST ORIGIN",
          title: "Broadcast Origin",
          expectedLength: 4,
          hash: "a7be8e1fe282a37cd666e0632b17d933fa13f21addf4798fc0455bc166e2488c",
          assetType: "text",
          assetMeta: "Foundation year",
          assetSymbol: "1990",
          assetCaption: "When bandwidth is constrained, old broadcast infrastructure becomes the signal path worth dating precisely.",
          prompt: [
            "Limited connectivity made external broadcasting channels strategically important.",
            "Identify the year Radio Marti was established."
          ]
        },
        {
          id: 9,
          tracker: "BREADCRUMB TRACK: 09 / 10 // OPERATIONAL ANCHOR: MODERN COMMS PATTERN",
          title: "Modern Comms Pattern",
          expectedLength: 8,
          hash: "77877a6e15b4b85d927a53604ef263ab77b59321023244a6be5be8f5c7fa1e44",
          assetType: "text",
          assetMeta: "Current channel",
          assetSymbol: "W",
          assetCaption: "The tool is ordinary, mobile, encrypted, and socially sticky enough to replace distance with cadence.",
          prompt: [
            "Historical broadcasting gave way to newer communication channels among exile communities.",
            "Identify the platform most commonly used today for daily coordination."
          ]
        },
        {
          id: 10,
          tracker: "BREADCRUMB TRACK: 10 / 10 // OPERATIONAL ANCHOR: FINAL VERIFICATION",
          title: "Certification Word",
          expectedLength: 5,
          hash: "9012389aad4eb9be53d225c4bbe72098ebdb37b97a52893171ff1bce0d40f383",
          assetType: "text",
          assetMeta: "Final verification",
          assetSymbol: "OSINT",
          assetCaption: "Your last answer is not hidden in the evidence. It is the discipline that let you read the evidence correctly.",
          prompt: [
            "You traced the campaign, synthetic identities, propaganda narratives, censorship limits, and modern communication patterns.",
            "Enter the discipline that guided the full investigation."
          ]
        }
      ];

      function sanitizeInput(value) {
        return value.toUpperCase().replace(/\s+/g, "");
      }

      function generateToken() {
        const randomValues = new Uint32Array(4);
        window.crypto.getRandomValues(randomValues);
        return Array.from(randomValues, (value) => CHARSET[value % CHARSET.length]).join("");
      }

      async function sha256(value) {
        const buffer = await window.crypto.subtle.digest(
          "SHA-256",
          new TextEncoder().encode(value)
        );
        return Array.from(new Uint8Array(buffer))
          .map((byte) => byte.toString(16).padStart(2, "0"))
          .join("");
      }

      function clearHintTimers() {
        state.hintTimers.forEach((timerId) => window.clearTimeout(timerId));
        state.hintTimers = [];
        if (state.feedbackTimer) {
          window.clearTimeout(state.feedbackTimer);
          state.feedbackTimer = null;
        }
      }

      function renderTrojanAsset() {
        return `
          <div class="asset-container">
            <img
              src="https://commons.wikimedia.org/wiki/Special:FilePath/The%20Procession%20of%20the%20Trojan%20Horse%20in%20Troy%20by%20Giovanni%20Domenico%20Tiepolo%20(cropped).jpg"
              alt="Giovanni Domenico Tiepolo, The Procession of the Trojan Horse into Troy"
              loading="eager"
              referrerpolicy="no-referrer"
            >
            <div class="asset-meta">Giovanni Domenico Tiepolo // The Procession of the Trojan Horse into Troy</div>
          </div>
        `;
      }

      function renderEvidenceAsset(stage) {
        return `
          <div class="asset-container">
            <div class="evidence-card">
              <div class="evidence-symbol">${stage.assetSymbol}</div>
              <div class="evidence-caption">${stage.assetCaption}</div>
            </div>
            <div class="asset-meta">${stage.assetMeta}</div>
          </div>
        `;
      }

      function renderLanding() {
        app.innerHTML = `
          <section class="landing">
            <div class="system-status">BREADCRUMB SYSTEM STATUS: SECURE // OPERATOR ACCESS REQUIRED</div>
            <div class="landing-card">
              <div class="landing-mark">Breadcrumb</div>
              <div class="landing-statement">
                In a digital landscape crowded with noise, the truth is a breadcrumb hidden within a global haystack; your only weapon is objective verification.
              </div>
              <button class="landing-cta" id="accept-challenge" type="button">[ Initialize Breadcrumb Run ]</button>
            </div>
          </section>
        `;

        document.getElementById("accept-challenge").addEventListener("click", () => {
          navigateToStage(1, true);
        });
      }

      function renderStage(stageNumber) {
        const stage = stageDefinitions.find((item) => item.id === stageNumber);
        if (!stage) {
          navigateHome(true);
          return;
        }

        const assetMarkup = stage.assetType === "trojan"
          ? renderTrojanAsset()
          : renderEvidenceAsset(stage);

        app.innerHTML = `
          <section class="stage-shell">
            <div class="stage-frame">
              <div class="stage-tracker">${stage.tracker}</div>
              <div class="stage-body">
                ${assetMarkup}
                <div class="prompt-block">
                  <div class="prompt-title">${stage.title}</div>
                  <div class="prompt-copy">
                    ${stage.prompt.map((paragraph) => `<p>${paragraph}</p>`).join("")}
                  </div>
                </div>
                <div class="hint-rail">
                  <div class="hint-card" id="hint-card"></div>
                </div>
                <div class="feedback-line" id="feedback-line"></div>
                <div class="input-frame">
                  <input
                    id="stage-input"
                    class="stage-input"
                    type="text"
                    spellcheck="false"
                    autocomplete="off"
                    autocapitalize="characters"
                    placeholder="${INPUT_PLACEHOLDER}"
                    aria-label="${INPUT_PLACEHOLDER}"
                  >
                </div>
              </div>
            </div>
          </section>
        `;

        const input = document.getElementById("stage-input");
        input.focus();
        input.addEventListener("input", handleStageInput);

        if (stage.id === 1) {
          mountStageOneToken();
          mountStageOneHints();
        } else {
          state.activeStageHash = stage.hash;
        }
      }

      function renderCompletion() {
        app.innerHTML = `
          <section class="completion">
            <div class="completion-card">
              <div class="landing-mark">Breadcrumb Complete</div>
              <h2>Verification survived the noise.</h2>
              <p>
                You completed the full investigation path and held the signal long enough to turn fragments into structure. The trail remains open whenever you want to run it again.
              </p>
              <div class="cta-row">
                <button class="solid-button" id="restart-run" type="button">Run Breadcrumb Again</button>
                <button class="ghost-button" id="return-home" type="button">Return to Entry Point</button>
              </div>
            </div>
          </section>
        `;

        document.getElementById("restart-run").addEventListener("click", () => {
          localStorage.setItem("current_stage", "1");
          navigateToStage(1, true);
        });
        document.getElementById("return-home").addEventListener("click", () => {
          navigateHome(true);
        });
      }

      function showFeedback(type, message) {
        const feedback = document.getElementById("feedback-line");
        if (!feedback) {
          return;
        }

        feedback.className = `feedback-line is-visible ${type}`;
        feedback.textContent = message;

        if (type === "error") {
          if (state.feedbackTimer) {
            window.clearTimeout(state.feedbackTimer);
          }
          state.feedbackTimer = window.setTimeout(() => {
            feedback.className = "feedback-line";
            feedback.textContent = "";
          }, 1200);
        }
      }

      async function handleStageInput(event) {
        const input = event.target;
        const stage = stageDefinitions.find((item) => item.id === state.currentStage);
        const sanitized = sanitizeInput(input.value);
        if (input.value !== sanitized) {
          input.value = sanitized;
        }

        if (!sanitized) {
          return;
        }

        const userHash = await sha256(sanitized);
        if (userHash !== state.activeStageHash) {
          if (stage && sanitized.length >= stage.expectedLength) {
            showFeedback("error", "Token mismatch");
          }
          return;
        }

        showFeedback("success", "Token verified");
        input.disabled = true;
        const nextStage = state.currentStage + 1;
        localStorage.setItem("current_stage", String(nextStage));

        window.setTimeout(() => {
          if (nextStage > TOTAL_STAGES) {
            navigateToCompletion(true);
            return;
          }
          navigateToStage(nextStage, true);
        }, 520);
      }

      async function mountStageOneToken() {
        const token = generateToken();
        state.activeStageHash = await sha256(token);
        const nextUrl = new URL(window.location.href);
        nextUrl.pathname = "/stage-1";
        nextUrl.searchParams.set("sector", token);
        window.history.replaceState({ view: "stage", stage: 1 }, "", nextUrl);
      }

      function mountStageOneHints() {
        const hintCard = document.getElementById("hint-card");
        if (!hintCard) {
          return;
        }

        const hintOne = window.setTimeout(() => {
          hintCard.innerHTML = `<strong>[INTEL ALERT - DECEPTION DIAGNOSTIC]</strong> Do not get trapped by the facade of the visual payload. Disinformation operations mask their true origin under the guise of an offering. To bypass the trap, an agent must audit the structural parameters of the host network. Look at the boundary of your deployment frame.`;
          hintCard.classList.add("is-visible");
        }, 120000);

        const hintTwo = window.setTimeout(() => {
          hintCard.innerHTML = `<strong>[INTEL ALERT - RECON DIRECTIVE]</strong> The structural truth is hidden in plain sight outside the walls of the asset container. Scan the terminal navigation routing path. The unique four-digit operational DOMAIN token you require is pinned to the absolute trailing edge of your active browser parameter string.`;
          hintCard.classList.add("is-visible");
        }, 240000);

        state.hintTimers.push(hintOne, hintTwo);
      }

      function withTransition(callback) {
        if (state.transitionLock) {
          return;
        }
        state.transitionLock = true;
        clearHintTimers();
        app.classList.add("is-transitioning");

        window.setTimeout(() => {
          callback();
          requestAnimationFrame(() => {
            app.classList.remove("is-transitioning");
            state.transitionLock = false;
          });
        }, 220);
      }

      function navigateHome(animate = false) {
        const execute = () => {
          state.currentView = "landing";
          state.currentStage = 1;
          window.history.pushState({ view: "landing" }, "", "/");
          renderLanding();
        };

        if (animate) {
          withTransition(execute);
        } else {
          execute();
        }
      }

      function navigateToStage(stageNumber, animate = false, preserveUrl = false) {
        const execute = () => {
          state.currentView = "stage";
          state.currentStage = stageNumber;
          if (!preserveUrl) {
            const nextUrl = stageNumber === 1 ? "/stage-1" : `${ROUTE_STAGE_PREFIX}${stageNumber}`;
            window.history.pushState({ view: "stage", stage: stageNumber }, "", nextUrl);
          }
          renderStage(stageNumber);
        };

        if (animate) {
          withTransition(execute);
        } else {
          execute();
        }
      }

      function navigateToCompletion(animate = false) {
        const execute = () => {
          state.currentView = "complete";
          window.history.pushState({ view: "complete" }, "", "/complete");
          renderCompletion();
        };

        if (animate) {
          withTransition(execute);
        } else {
          execute();
        }
      }

      function resolveRoute() {
        const pathname = window.location.pathname;
        const completion = pathname === "/complete";
        if (completion) {
          renderCompletion();
          return;
        }

        const stageMatch = pathname.match(/^\/stage-(\d+)$/);
        if (stageMatch) {
          const stageNumber = Number.parseInt(stageMatch[1], 10);
          state.currentView = "stage";
          state.currentStage = Math.min(Math.max(stageNumber, 1), TOTAL_STAGES);
          renderStage(state.currentStage);
          return;
        }

        renderLanding();
      }

      window.addEventListener("popstate", () => {
        clearHintTimers();
        resolveRoute();
      });

      resolveRoute();
    })();
  </script>
</body>
</html>
